<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarney PJS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-yellow: #FFB800;
            --primary-blue: #29B6F6;
            --primary-green: #76D200;
            --gray-light: #EBEBEB;
            --text-dark: #1A1A1A;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif;
            background: #fff; 
            display: flex; 
            justify-content: center; 
        }

        .app-interface { 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 40px 24px; 
            box-sizing: border-box; 
        }

        .progress-bar { display: flex; gap: 6px; margin-bottom: 40px; }
        .step { flex: 1; height: 6px; background-color: var(--gray-light); border-radius: 10px; }
        .step.active { background-color: var(--primary-blue); }
        
        .question-text { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 40px; line-height: 1.2; min-height: 60px;}
        .options-list { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; align-items: center;}
        
        .option { 
            padding: 16px 24px; border: 2px solid var(--gray-light); border-radius: 16px; 
            background: white; font-family: 'Poppins', sans-serif; font-weight: 500; 
            cursor: pointer; transition: 0.2s; width: 100%; max-width: 300px;
            text-align: center; font-size: 17px; color: #555;
        }

        .option.selected { border-color: var(--primary-blue); background-color: #f0faff; color: var(--text-dark); }

        #final-result-screen { display: none; flex-direction: column; align-items: center; text-align: center; animation: popIn 0.5s ease; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 340px; }
        .stat-card { border-radius: 20px; overflow: hidden; border: 2px solid transparent; }
        .stat-header { color: white; font-size: 11px; font-weight: 700; padding: 8px 0; text-transform: uppercase; }
        .stat-body { background: white; padding: 15px; font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .card-green { background: var(--primary-green); border-color: var(--primary-green); }
        .card-blue { background: var(--primary-blue); border-color: var(--primary-blue); }
        .card-yellow { background: var(--primary-yellow); border-color: var(--primary-yellow); }
        .green-text { color: var(--primary-green); }
        .blue-text { color: var(--primary-blue); }
        .yellow-text { color: var(--primary-yellow); }

        .btn-action { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; 
            font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; 
            text-transform: uppercase; cursor: pointer; margin-top: 40px; 
        }
        .btn-check { background-color: var(--gray-light); color: #999; }
        .btn-check.ready { background-color: var(--primary-blue); color: white; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <main class="app-interface">
        <div id="quiz-screen" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div style="text-align: center; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; font-size: 14px; color: #aaa;">QUIZ MARINHO</div>
            <div class="progress-bar" id="progress-bar"></div>
            <h1 class="question-text" id="question-title">Carregando...</h1>
            <div class="options-list" id="options-container"></div>
            <button class="btn-action btn-check" id="submit-btn" disabled>Confirmar Resposta</button>
        </div>

        <div id="final-result-screen">
            <h1 style="color: var(--primary-blue); font-size: 34px; font-weight: 800; margin-top: 60px;">Fim do Quiz!</h1>
            <div class="stats-grid">
                <div class="stat-card card-green"><div class="stat-header">Acertos</div><div class="stat-body green-text">🎯 <span id="res-acertos">0%</span></div></div>
                <div class="stat-card card-blue"><div class="stat-header">Tempo</div><div class="stat-body blue-text">⏱️ <span id="res-tempo">0:00</span></div></div>
                <div class="stat-card card-yellow" style="grid-column: span 2; width: 60%; justify-self: center;">
                    <div class="stat-header">Total XP</div><div class="stat-body yellow-text">⚡ <span id="res-xp-total">0</span></div>
                </div>
            </div>
            <button class="btn-action btn-check ready" style="margin-top: 80px;" onclick="location.reload()">Refazer Quiz</button>
        </div>
    </main>

    <script>
        // --- CONFIGURAÇÃO DE SONS ---
        const audioAcerto = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const audioErro = new Audio('https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3');

        // --- TABELA DE PERGUNTAS (A primeira opção deve ser a correta) ---
        const bancoDeDados = [

            { 
                q: "O DESCARTE INCORRETO DE PLÁSTICOS NOS OCEANOS AFETA AS TARTARUGAS MARINHAS PORQUE:", 
                options: ["Elas confundem sacolas plásticas com águas-vivas", "O plástico aquece a água", "O plástico ajuda elas a flutuarem", "Elas usam plástico para fazer ninhos"] 
            },

            { 
                q: "O TUBARÃO-BALEIA CORRE RISCO DE EXTINÇÃO PRINCIPALMENTE POR:", 
                options: ["Pesca predatória e colisões com navios", "Ataques de orcas", "Falta de oxigênio", "Pararem de nadar"] 
            },

            { 
                q: "QUAL DESTAS AÇÕES MAIS AJUDA A REDUZIR A POLUIÇÃO MARINHA?", 
                options: ["Reduzir o uso de plásticos descartáveis", "Jogar lixo longe da praia", "Alimentar peixes com pão", "Usar muito protetor solar"] 
            },

            { 
                q: "O QUE SÃO AS CHAMADAS REDES FANTASMA?", 
                options: ["Redes abandonadas que continuam matando animais", "Redes invisíveis", "Algas em formato de rede", "Redes para capturar fantasmas"] 
            },

            { 
                q: "MUITAS ESPÉCIES DE CAVALOS-MARINHOS ESTÃO EM DECLÍNIO PORQUE:", 
                options: ["São capturados para medicina tradicional e aquários", "Nadam rápido demais", "Não conseguem se camuflar", "O mar está doce"] 
            },

            { 
                q: "POR QUE OS MANGUEZAIS SÃO IMPORTANTES PARA A VIDA MARINHA?", 
                options: ["Funcionam como berçários para filhotes", "Impedem tubarões na praia", "Produzem sal para o oceano", "Servem para descarte de lixo"] 
            },

            { 
                q: "POR QUE A PESCA DE ARRASTO É PREJUDICIAL?", 
                options: ["Destrói o fundo do mar e captura espécies indevidas", "Pesca apenas peixes velhos", "É silenciosa demais", "Limpa o fundo do oceano"] 
            }
        ];

        let perguntasSorteadas = [];
        let currentQ = 0, totalXP = 0, acertos = 0, startTime = Date.now();

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            perguntasSorteadas = shuffle([...bancoDeDados]).map(item => {
                const correctAns = item.options[0];
                return {
                    q: item.q,
                    correct: correctAns,
                    options: shuffle([...item.options])
                };
            });
            loadQuestion();
        }

        function loadQuestion() {
            const data = perguntasSorteadas[currentQ];
            const btn = document.getElementById('submit-btn');
            document.getElementById('question-title').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            btn.classList.remove('ready'); 
            btn.disabled = true;

            data.options.forEach((opt) => {
                const b = document.createElement('button');
                b.className = 'option'; 
                b.innerText = opt;
                b.onclick = () => {
                    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                    b.classList.add('selected'); 
                    btn.classList.add('ready'); 
                    btn.disabled = false;
                    btn.dataset.selectedText = opt;
                };
                container.appendChild(b);
            });

            const bar = document.getElementById('progress-bar');
            bar.innerHTML = '';
            perguntasSorteadas.forEach((_, i) => {
                const s = document.createElement('div');
                s.className = 'step' + (i <= currentQ ? ' active' : '');
                bar.appendChild(s);
            });
        }

        document.getElementById('submit-btn').onclick = () => {
            const selectedText = document.getElementById('submit-btn').dataset.selectedText;
            const isCorrect = selectedText === perguntasSorteadas[currentQ].correct;
            
            // --- LÓGICA DE SOM ---
            if(isCorrect) { 
                audioAcerto.currentTime = 0; // Reinicia o som se clicar rápido
                audioAcerto.play();
                totalXP += 10; 
                acertos++; 
            } else {
                audioErro.currentTime = 0;
                audioErro.play();
            }

            if(currentQ < perguntasSorteadas.length - 1) { 
                currentQ++; 
                loadQuestion(); 
            } else { 
                showFinalResults(); 
            }
        };

        function showFinalResults() {
            const totalSeconds = Math.floor((Date.now() - startTime) / 1000);
            const min = Math.floor(totalSeconds / 60);
            const sec = totalSeconds % 60;
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('final-result-screen').style.display = 'flex';
            document.getElementById('res-acertos').innerText = Math.round((acertos/perguntasSorteadas.length)*100) + '%';
            document.getElementById('res-tempo').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            document.getElementById('res-xp-total').innerText = totalXP;
        }

        initQuiz();
    </script>
</body>
</html>
